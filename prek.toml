# prek.toml — Git hook configuration for come-follow-me-app
#
# Installation:
#   uv add --dev prek
#   uv run prek install

minimum_prek_version = "0.3.0"

default_install_hook_types = ["pre-commit", "commit-msg"]
default_stages = ["pre-commit"]


[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace", priority = 0 },
  { id = "end-of-file-fixer", priority = 0 },
  { id = "check-yaml", priority = 0 },
  { id = "check-json", priority = 0 },
  { id = "check-toml", priority = 0 },
  { id = "check-merge-conflict", priority = 0 },
  { id = "check-case-conflict", priority = 0 },
  { id = "check-symlinks", priority = 0 },
  { id = "detect-private-key", priority = 0 },
  { id = "mixed-line-ending", priority = 0 },
]


[[repos]]
repo = "https://github.com/gitleaks/gitleaks"
rev = "v8.24.3"
hooks = [
  { id = "gitleaks", priority = 0 },
]


[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v5.0.0"
hooks = [
{ id = "check-added-large-files", args = ["--maxkb=500"], priority = 0 },
]


[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.11.8"
hooks = [
  { id = "ruff", args = ["--fix"], priority = 10 },
  { id = "ruff-format", priority = 10 },
]


[[repos]]
repo = "https://github.com/compilerla/conventional-pre-commit"
rev = "v4.1.0"
hooks = [
  { id = "conventional-pre-commit", stages = ["commit-msg"], args = [
    "feat", "fix", "refactor", "docs", "test", "ci", "chore", "build", "perf",
  ] },
]
